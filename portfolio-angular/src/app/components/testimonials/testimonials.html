<section id="testimonials" class="testimonials-section">
  <div class="container">
    <div class="section-header reveal">
      <h2 class="gradient-text"><i class="fas fa-quote-right"></i> Témoignages</h2>
      <p>Ce que disent mes clients et partenaires de nos collaborations.</p>
    </div>

    <!-- Swiper Container -->
    <div class="swiper testimonials-swiper reveal">
      <div class="swiper-wrapper">
        <div class="swiper-slide" *ngFor="let item of testimonials">
          <div class="testimonial-card glass-card magnetic">
            <div class="quote-icon"><i class="fas fa-quote-left"></i></div>
            
            <p class="testimonial-content">"{{ item.content }}"</p>
            
            <div class="testimonial-footer">
              <div class="testimonial-info">
                <div class="testimonial-avatar">
                  <img [src]="item.avatar" alt="{{ item.name }}" title="{{ item.name }}">
                </div>
                <div class="testimonial-meta">
                  <h4 class="testimonial-name">{{ item.name }}</h4>
                  <p class="testimonial-role">{{ item.role }}</p>
                </div>
              </div>
              
              <div class="testimonial-rating">
                <i class="fas fa-star" *ngFor="let star of getRatingArray(item.rating)"></i>
              </div>
            </div>
          </div>
        </div>
      </div>
      
      <!-- Pagination -->
      <div class="swiper-pagination"></div>
    </div>
  </div>
</section>
